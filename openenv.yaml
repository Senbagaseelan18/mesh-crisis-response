name: emergency-mesh-router
version: "1.0.0"
description: "Emergency Mesh-Network Router using RL for disaster alert routing"

# MANDATORY: Environment specification
environment:
  class: "server.environment.MeshNetworkEnvironment"
  module: "server.environment"
  reset_method: "reset"
  step_method: "step"
  observation_method: "state"

# MANDATORY: Observation space
observation_space:
  type: "Dict"
  properties:
    current_device_id:
      type: "string"
    current_rssi:
      type: "number"
    current_battery:
      type: "number"
    neighboring_devices:
      type: "array"
    gateway_distance:
      type: "number"
    hops_taken:
      type: "integer"
    time_step:
      type: "integer"
    task_difficulty:
      type: "string"

# MANDATORY: Action space
action_space:
  type: "Discrete"
  n: 12
  description: "Target device ID for forwarding alert"

# MANDATORY: Tasks with explicit graders (SIMPLIFIED FORMAT FOR VALIDATOR)
tasks:
  easy:
    grader: RewardThresholdGrader
  medium:
    grader: EfficientGrader
  hard:
    grader: RobustnessGrader
  expert:
    grader: BatteryEfficientGrader
  extreme:
    grader: BalancedMetricsGrader

# MANDATORY: Grader implementations (SIMPLIFIED FORMAT FOR VALIDATOR)
graders:
  RewardThresholdGrader: {}
  EfficientGrader: {}
  RobustnessGrader: {}
  BatteryEfficientGrader: {}
  BalancedMetricsGrader: {}

# Metadata
metadata:
  author: "OpenEnv Team"
  license: "MIT"
  tags:
    - "rl"
    - "mesh-network"
    - "disaster-response"
  keywords:
    - emergency
    - routing
    - mesh-network
    - reinforcement-learning
