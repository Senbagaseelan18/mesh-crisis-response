name: emergency-mesh-router
version: "1.0.0"
description: "Emergency Mesh-Network Router using RL for disaster alert routing"

# MANDATORY: Environment specification
environment:
  class: "server.environment.MeshNetworkEnvironment"
  module: "server.environment"
  reset_method: "reset"
  step_method: "step"
  observation_method: "get_observation"

# MANDATORY: Observation space
observation_space:
  type: "Dict"
  properties:
    device_id:
      type: "integer"
    rssi:
      type: "number"
    battery:
      type: "number"
    neighbors:
      type: "array"
    gateway_distance:
      type: "integer"
    hops:
      type: "integer"

# MANDATORY: Action space
action_space:
  type: "Discrete"
  n: 12
  description: "Target device ID (0-11) for forwarding alert"

# MANDATORY: Tasks with graders
tasks:
  easy:
    name: "Easy - Direct Path"
    description: "Gateway is 1 hop away, high battery"
    difficulty: 1
    max_steps: 5
    config:
      hop_limit: 5
      min_battery: 100
    grader:
      type: "default"
      success_threshold: 0.8

  medium:
    name: "Medium - Multi-hop"
    description: "Gateway is 3 hops away, moderate battery"
    difficulty: 2
    max_steps: 10
    config:
      hop_limit: 10
      min_battery: 60
    grader:
      type: "default"
      success_threshold: 0.6

  hard:
    name: "Hard - Long Distance"
    description: "Gateway is 5+ hops away, low battery"
    difficulty: 3
    max_steps: 20
    config:
      hop_limit: 20
      min_battery: 30
    grader:
      type: "default"
      success_threshold: 0.5

# MANDATORY: Graders
graders:
  default:
    type: "RewardThresholdGrader"
    min_reward: 0.0
    max_reward: 1.0
    success_threshold: 0.5

# Metadata
metadata:
  author: "OpenEnv Team"
  license: "MIT"
  tags:
    - "rl"
    - "mesh-network"
    - "disaster-response"
