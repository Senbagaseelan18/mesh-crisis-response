name: emergency-mesh-router
version: "1.0.0"
description: "Emergency Mesh-Network Router using RL for disaster alert routing"

# MANDATORY: Environment specification
environment:
  class: "server.environment.MeshNetworkEnvironment"
  module: "server.environment"
  reset_method: "reset"
  step_method: "step"
  observation_method: "state"

# MANDATORY: Observation space
observation_space:
  type: "Dict"
  properties:
    current_device_id:
      type: "string"
    current_rssi:
      type: "number"
    current_battery:
      type: "number"
    neighboring_devices:
      type: "array"
    gateway_distance:
      type: "number"
    hops_taken:
      type: "integer"
    time_step:
      type: "integer"
    task_difficulty:
      type: "string"

# MANDATORY: Action space
action_space:
  type: "Discrete"
  n: 12
  description: "Target device ID for forwarding alert"

# MANDATORY: Tasks with explicit graders
tasks:
  easy:
    name: "Easy - Direct Path"
    description: "Gateway is 1 hop away, high battery"
    difficulty: 1
    max_steps: 5
    config:
      hop_limit: 5
      min_battery: 100
    grader:
      class: "graders.RewardThresholdGrader"
      module: "graders"
      config:
        min_reward: 0.0
        max_reward: 1.0
        success_threshold: 0.8

  medium:
    name: "Medium - Multi-hop"
    description: "Gateway is 3 hops away, moderate battery"
    difficulty: 2
    max_steps: 10
    config:
      hop_limit: 10
      min_battery: 60
    grader:
      class: "graders.EfficientGrader"
      module: "graders"
      config:
        success_threshold: 0.6

  hard:
    name: "Hard - Long Distance"
    description: "Gateway is 5+ hops away, low battery"
    difficulty: 3
    max_steps: 20
    config:
      hop_limit: 20
      min_battery: 30
    grader:
      class: "graders.RobustnessGrader"
      module: "graders"
      config:
        success_threshold: 0.5

# MANDATORY: Grader implementations
graders:
  default:
    class: "graders.RewardThresholdGrader"
    module: "graders"
    description: "Grades based on reward thresholds"
    config:
      min_reward: 0.0
      max_reward: 1.0
      success_threshold: 0.5
  
  efficient:
    class: "graders.EfficientGrader"
    module: "graders"
    description: "Grades based on hop efficiency"
    config:
      success_threshold: 0.6
  
  robustness:
    class: "graders.RobustnessGrader"
    module: "graders"
    description: "Grades on robustness across conditions"
    config:
      success_threshold: 0.5

# Metadata
metadata:
  author: "OpenEnv Team"
  license: "MIT"
  tags:
    - "rl"
    - "mesh-network"
    - "disaster-response"
  keywords:
    - emergency
    - routing
    - mesh-network
    - reinforcement-learning
